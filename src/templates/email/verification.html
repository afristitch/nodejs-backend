{{> header}}

<p style="font-family: 'Geist Mono', monospace; color: #000; font-size: 16px;">
  Hi {{name}},
</p>

<p style="font-family: 'Geist Mono', monospace; color: #000; font-size: 16px;">
  Please verify your email address by clicking the button below:
</p>

<p style="text-align: center; margin: 30px 0;">
  <a href="{{url}}" style="background-color: #000; color: #fff; padding: 12px 25px; text-decoration: none; border-radius: 5px; font-weight: bold;">
    Verify Email
  </a>
</p>

<p style="font-family: 'Geist Mono', monospace; color: #555; font-size: 14px;">
  Or copy and paste this link into your browser: <br>
  <span style="word-break: break-all;">{{url}}</span>
</p>

{{> footer}}
