{{> header}}

<p style="font-family: 'Geist Mono', monospace; color: #000; font-size: 16px;">
  Hi {{name}},
</p>

<p style="font-family: 'Geist Mono', monospace; color: #000; font-size: 16px;">
  Your account has been created. Here are your credentials:
</p>

<div style="background-color: #f9f9f9; padding: 15px; border-radius: 5px; margin: 20px 0; font-family: 'Geist Mono', monospace; color: #000;">
  <p><strong>Email:</strong> {{email}}</p>
  <p><strong>Password:</strong> {{password}}</p>
</div>

<p style="text-align: center; margin: 30px 0;">
  <a href="{{loginUrl}}" style="background-color: #000; color: #fff; padding: 12px 25px; text-decoration: none; border-radius: 5px; font-weight: bold;">
    Login Now
  </a>
</p>

{{> footer}}
